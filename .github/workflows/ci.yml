name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-24.04
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          git \
          python3 \
          python3-pip \
          pkg-config \
          libssl-dev \
          zlib1g-dev \
          libtcmalloc-minimal4 \
          uuid-dev \
          tcl-dev \
          libffi-dev \
          libreadline-dev \
          bison \
          flex \
          libfl-dev \
          libunwind-dev \
          libgoogle-perftools-dev \
          ccache \
          help2man

    - name: Cache Verilator build
      id: cache-verilator
      uses: actions/cache@v4
      with:
        path: /opt/verilator-5.048
        key: verilator-5.048-${{ runner.os }}

    - name: Build Verilator 5.048 from source
      # Ubuntu 24.04's stock `verilator` package is 5.020 which is fine
      # for SVA parsing, but pin a specific newer release here so
      # test/test_sim_equivalence.py runs against the same Verilator on
      # CI and on developer machines (where the OS package is typically
      # too old — 22.04 only has 4.038).
      if: steps.cache-verilator.outputs.cache-hit != 'true'
      run: |
        git clone --depth=1 -b v5.048 https://github.com/verilator/verilator.git /tmp/verilator
        cd /tmp/verilator
        autoconf
        ./configure --prefix=/opt/verilator-5.048
        make -j$(nproc)
        sudo make install

    - name: Add Verilator to PATH
      run: |
        echo "/opt/verilator-5.048/bin" >> $GITHUB_PATH
        echo "PATH after: /opt/verilator-5.048/bin:$PATH"
        /opt/verilator-5.048/bin/verilator --version

    - name: Setup GCC-11
      shell: bash
      run: |
        # Yosys v0.66 hard-requires C++20: its build passes `-std=c++20`, which
        # g++-9 rejects ("unrecognized ... did you mean -std=c++2a").  Use g++-11
        # (the locally-validated toolchain) so Yosys builds; Surelog/antlr4 still
        # build at C++17 and the uhdm2rtlil plugin at C++20.
        sudo apt install -y g++-11
        sudo ln -sf /usr/bin/g++-11 /usr/bin/g++
        sudo ln -sf /usr/bin/gcc-11 /usr/bin/gcc
        sudo ln -sf /usr/bin/gcov-11 /usr/bin/gcov
    
    - name: Setup ccache
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        key: ${{ github.job }}-${{ matrix.os }}
        max-size: 2G
        
    # Temporarily disabled - cache restore
    #- name: Cache build dependencies
    #  uses: actions/cache@v4
    #  with:
    #    path: |
    #      build/
    #      third_party/Surelog/build/
    #      third_party/yosys/
    #      ~/.cache/pip
    #    key: ${{ runner.os }}-build-${{ hashFiles('**/CMakeLists.txt', '**/Makefile', '**/requirements.txt') }}
    #    restore-keys: |
    #      ${{ runner.os }}-build-
    
    - name: Install Python dependencies
      run: |
        pip3 install orderedmultidict
    
    - name: Setup ccache environment
      run: |
        echo "CC=ccache gcc" >> $GITHUB_ENV
        echo "CXX=ccache g++" >> $GITHUB_ENV
        ccache --set-config=cache_dir=$HOME/.ccache
        ccache --set-config=max_size=2G
        ccache --set-config=compression=true
        ccache --zero-stats
    
    - name: Build project
      run: |
        # Clean any potential cmake cache that might have wrong compiler info
        rm -rf build/CMakeCache.txt build/CMakeFiles/
        # Explicitly pass compiler to make/cmake
        make -j4 CC="ccache gcc" CXX="ccache g++" CPU_CORES=4
        
    - name: Print ccache statistics
      run: |
        ccache --show-stats

    # Fast smoke test of the read_sv command (in-process Surelog compile, no
    # .uhdm file).  Run first so a broken plugin entry point fails early,
    # before the long internal + Yosys sweep.
    - name: Test read_sv command
      run: |
        make test-read-sv

    - name: Run tests (internal + Yosys)
      run: |
        cd test
        bash run_all_tests.sh --all
    
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: |
          test/**/rtlil_diff.txt
          test/**/*_from_uhdm.il
          test/**/*_from_verilog.il
          test/**/*.log
        retention-days: 7
    
    - name: Upload build artifacts
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts
        path: |
          out/
          build/bin/
        retention-days: 7