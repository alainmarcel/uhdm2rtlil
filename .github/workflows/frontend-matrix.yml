name: Frontend Matrix

# 4-frontend SystemVerilog regression matrix: runs every test (internal + the
# upstream Yosys suite) through verilog / uhdm / sv2v / slang and classifies
# synthesize? + correct? (formal equiv vs the verilog golden AND Verilator
# co-sim vs the original RTL).  See test/FRONTEND_MATRIX_README.md.
#
# HEAVY sweep (1000+ tests x 4 frontends) — NOT wired into per-push/PR CI; runs
# nightly and on manual workflow_dispatch.
#
# Structure: build ONCE, then fan out.
#   * build   — compile Surelog + Yosys + plugins + frontends, upload a curated
#               runtime tarball (so the shards don't each rebuild — the binaries
#               are statically linked, so the tarball is self-contained).
#   * shard   — 6-way matrix; each downloads the runtime, runs `--shard i/N` over
#               its slice, uploads its CSV.  (1000+ tests don't fit one runner's
#               6-hour limit, hence sharding.)
#   * combine — merge the shard CSVs into the final report.
#
# Nightly runs WITH the Verilator co-sim so the matrix can adjudicate verdicts
# the same way `make test-all` does (formal-equiv alone leaves real divergences
# as UNKNOWN).  Set the `cosim` dispatch input to false for a faster formal-only
# run.

on:
  workflow_dispatch:
    inputs:
      scope:
        description: "Test scope: --all (internal+Yosys), --yosys, or '' (internal only)"
        required: false
        default: "--all"
      cosim:
        description: "Run Verilator co-sim (accurate classification; slower). Off = formal-only."
        type: boolean
        required: false
        default: true
      jobs:
        # 1 by default: formal-SAT (and Verilator) are memory-hungry; 4 OOM-kills
        # the 16 GB runner ("runner received a shutdown signal", exit 143), and 2
        # STILL intermittently blows the shard timeout / gets SIGTERM'd on heavy
        # designs (shards 2 & 5 in run 27928983694).  A single process per shard
        # runs serially and completes cleanly (~8 min/shard, well within budget),
        # so default to 1 for reliability; bump only if a run needs to be faster.
        description: "Parallel jobs within each shard (1 = serial, most reliable)"
        required: false
        default: "1"
      cycles:
        description: "Verilator co-sim cycles per test"
        required: false
        default: "100"
  schedule:
    # Nightly at 06:00 UTC.
    - cron: "0 6 * * *"

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
    - name: Free up disk space
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                    /opt/hostedtoolcache/CodeQL || true

    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential cmake git python3 python3-pip pkg-config \
          libssl-dev zlib1g-dev libtcmalloc-minimal4 uuid-dev tcl-dev \
          libffi-dev libreadline-dev bison flex libfl-dev libunwind-dev \
          libgoogle-perftools-dev ccache help2man unzip g++-9 g++-13

    - name: Setup ccache
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        key: frontend-matrix-build
        max-size: 2G

    - name: Install Python dependencies
      # Surelog/UHDM's CMake configure needs this Python package.
      run: pip3 install orderedmultidict

    - name: Build project (Surelog + Yosys + uhdm2rtlil plugin)
      run: |
        sudo ln -sf /usr/bin/g++-9 /usr/bin/g++
        sudo ln -sf /usr/bin/gcc-9 /usr/bin/gcc
        sudo ln -sf /usr/bin/gcov-9 /usr/bin/gcov
        rm -rf build/CMakeCache.txt build/CMakeFiles/
        make -j4 CC="ccache gcc" CXX="ccache g++" CPU_CORES=4

    - name: Build external frontends (sv2v + yosys-slang)
      # sv2v: prebuilt binary (the runner's GHC rejects gcc with clang-style
      # flags, so the source build is doomed).  slang: needs gcc >= 11 -> gcc-13.
      run: |
        cd test
        SV2V_PREBUILT=1 ./build_frontends.sh sv2v
        CC=gcc-13 CXX=g++-13 ./build_frontends.sh slang
        echo "--- versions ---"; cat ../build/frontends/versions.txt || true

    - name: Package runtime
      # Only the run-time bits the harness invokes — statically linked, so this
      # tarball runs on a shard runner with just the system runtime libs (apt).
      # --dereference so build/slang.so (a symlink) becomes a real file.
      run: |
        tar -czhf runtime.tar.gz \
          out/current \
          build/uhdm2rtlil.so \
          build/extract_clocks_resets.so \
          build/slang.so \
          build/frontends/sv2v/bin/sv2v \
          build/third_party/Surelog/bin/surelog \
          build/frontends/versions.txt
        ls -lh runtime.tar.gz

    - name: Upload runtime
      uses: actions/upload-artifact@v4
      with:
        name: build-runtime
        path: runtime.tar.gz
        retention-days: 1

  shard:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4, 5, 6]
    runs-on: ubuntu-24.04
    timeout-minutes: 350
    steps:
    - name: Free up disk space
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                    /opt/hostedtoolcache/CodeQL || true

    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install runtime dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential autoconf cmake git python3 python3-pip \
          zlib1g-dev libtcmalloc-minimal4 tcl-dev libffi-dev libreadline-dev \
          bison flex libfl-dev libunwind-dev libgoogle-perftools-dev \
          help2man unzip

    - name: Cache Verilator build
      id: cache-verilator
      uses: actions/cache@v4
      with:
        path: /opt/verilator-5.048
        key: verilator-5.048-${{ runner.os }}

    - name: Build Verilator 5.048 from source
      if: steps.cache-verilator.outputs.cache-hit != 'true'
      run: |
        git clone --depth=1 -b v5.048 https://github.com/verilator/verilator.git /tmp/verilator
        cd /tmp/verilator
        autoconf
        ./configure --prefix=/opt/verilator-5.048
        make -j$(nproc)
        sudo make install

    - name: Add Verilator to PATH
      run: echo "/opt/verilator-5.048/bin" >> $GITHUB_PATH

    - name: Install Python dependencies
      run: pip3 install orderedmultidict

    - name: Download + unpack runtime
      uses: actions/download-artifact@v4
      with:
        name: build-runtime
    - run: |
        tar -xzf runtime.tar.gz
        test -x out/current/bin/yosys && test -f build/uhdm2rtlil.so
        echo "runtime unpacked"

    - name: Run shard ${{ matrix.shard }}/${{ strategy.job-total }}
      run: |
        cd test
        # Co-sim ON by default (incl. the nightly schedule, where the input is
        # empty); only an explicit `cosim=false` dispatch turns it off.
        COSIM_FLAG=""
        if [ "${{ github.event.inputs.cosim }}" = "false" ]; then
          COSIM_FLAG="--no-cosim"
        fi
        python3 -u run_frontend_matrix.py \
          ${{ github.event.inputs.scope || '--all' }} \
          --jobs ${{ github.event.inputs.jobs || '1' }} \
          --cycles ${{ github.event.inputs.cycles || '100' }} \
          --prune $COSIM_FLAG \
          --shard ${{ matrix.shard }}/${{ strategy.job-total }} \
          --out frontend_matrix_shard${{ matrix.shard }}

    - name: Upload shard CSV
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: matrix-shard-${{ matrix.shard }}
        path: test/frontend_matrix_shard${{ matrix.shard }}.csv
        retention-days: 7

  combine:
    needs: shard
    if: always()
    runs-on: ubuntu-24.04
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download shard CSVs
      uses: actions/download-artifact@v4
      with:
        pattern: matrix-shard-*
        path: shards
        merge-multiple: true

    - name: Combine shards into the final report
      # A shard that OOM/crashes can't upload its CSV (a killed runner skips even
      # if:always steps), so the merged report would silently be PARTIAL.  Detect
      # missing shards and flag the run loudly instead of pretending it's complete.
      run: |
        cp shards/frontend_matrix_shard*.csv test/ 2>/dev/null || true
        cd test
        ls -la frontend_matrix_shard*.csv || { echo "no shard CSVs at all"; exit 1; }
        EXPECTED=6
        FOUND=$(ls frontend_matrix_shard*.csv 2>/dev/null | wc -l)
        python3 run_frontend_matrix.py --combine "frontend_matrix_shard*.csv"
        echo "shards present: $FOUND / $EXPECTED" | tee -a "$GITHUB_STEP_SUMMARY"
        if [ "$FOUND" -lt "$EXPECTED" ]; then
          echo "::warning::PARTIAL report — only $FOUND of $EXPECTED shards produced a CSV (a shard likely OOM/crashed). Test counts are incomplete."
          { echo "> ⚠️ **PARTIAL report**: only $FOUND of $EXPECTED shards reported."; \
            echo "> Missing shard(s) likely OOM/crashed — test counts are incomplete."; } >> "$GITHUB_STEP_SUMMARY"
          exit 1
        fi

    - name: Publish report to job summary
      if: always()
      run: |
        if [ -f test/FRONTEND_MATRIX.md ]; then
          cat test/FRONTEND_MATRIX.md >> "$GITHUB_STEP_SUMMARY"
        else
          echo "No FRONTEND_MATRIX.md produced." >> "$GITHUB_STEP_SUMMARY"
        fi

    - name: Upload combined report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: frontend-matrix-report
        path: |
          test/frontend_matrix.csv
          test/FRONTEND_MATRIX.md
        retention-days: 30
